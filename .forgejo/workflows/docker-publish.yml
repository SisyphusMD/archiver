name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: sisyphusmd/archiver

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo Registry
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: forgejo.bryantserver.com
          username: cody
          password: ${{ secrets.BRYANTSERVER_REGISTRY_PAT }}

      - name: Log in to NAS Forgejo Registry
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: forgejo.nas.bryantserver.com
          username: cody
          password: ${{ secrets.NAS_FORGEJO_PAT }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PUSH_PAT }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            forgejo.bryantserver.com/${{ env.IMAGE_NAME }}
            forgejo.nas.bryantserver.com/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push Docker image
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=forgejo.bryantserver.com/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=forgejo.bryantserver.com/${{ env.IMAGE_NAME }}:buildcache,mode=max

  create-release:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract release info from CHANGELOG
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          HEADER=$(grep -E "^## \[${VERSION}\]" CHANGELOG.md | head -n1 || true)
          if [ -z "$HEADER" ]; then
            echo "No CHANGELOG entry for ${VERSION}" >&2
            exit 1
          fi

          HEADLINE=$(printf '%s\n' "$HEADER" | sed -nE 's/^## \[[^]]+\] - [0-9-]+ — (.+)$/\1/p')
          if [ -n "$HEADLINE" ]; then
            NAME="${TAG} - ${HEADLINE}"
          else
            NAME="${TAG}"
          fi

          BODY=$(awk -v v="${VERSION}" '
            $0 ~ "^## \\[" v "\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section && started { print }
            in_section && /[^[:space:]]/ && !started { started=1; print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            echo "Empty body extracted for ${VERSION}" >&2
            exit 1
          fi

          jq -n \
            --arg tag "$TAG" \
            --arg name "$NAME" \
            --arg body "$BODY" \
            '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}' \
            > /tmp/release-payload.json

          jq --arg sha "$SHA" '. + {target_commitish:$sha}' \
            /tmp/release-payload.json > /tmp/release-payload-github.json

          echo "Release name: ${NAME}"

      - name: Create or update Forgejo release
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          HTTP=$(curl -sSL -o /tmp/forgejo-existing.json -w "%{http_code}" \
            -H "Authorization: token $TOKEN" \
            "${API}/tags/${TAG}")
          if [ "$HTTP" = "200" ]; then
            ID=$(jq -r .id /tmp/forgejo-existing.json)
            echo "Updating existing Forgejo release ${ID}"
            curl -fsSL -X PATCH \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/json" \
              -d @/tmp/release-payload.json \
              "${API}/${ID}"
          else
            echo "Creating new Forgejo release for ${TAG}"
            curl -fsSL -X POST \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/json" \
              -d @/tmp/release-payload.json \
              "${API}"
          fi

      - name: Create or update NAS Forgejo release
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.NAS_FORGEJO_PAT }}
          API: https://forgejo.nas.bryantserver.com/api/v1/repos/${{ github.repository }}/releases
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          HTTP=$(curl -sSL -o /tmp/nas-forgejo-existing.json -w "%{http_code}" \
            -H "Authorization: token $TOKEN" \
            "${API}/tags/${TAG}")
          if [ "$HTTP" = "200" ]; then
            ID=$(jq -r .id /tmp/nas-forgejo-existing.json)
            echo "Updating existing NAS Forgejo release ${ID}"
            curl -fsSL -X PATCH \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/json" \
              -d @/tmp/release-payload.json \
              "${API}/${ID}"
          else
            echo "Creating new NAS Forgejo release for ${TAG}"
            curl -fsSL -X POST \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/json" \
              -d @/tmp/release-payload.json \
              "${API}"
          fi

      - name: Create or update GitHub release
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.GH_RELEASE_PAT }}
          API: https://api.github.com/repos/${{ github.repository }}/releases
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          HTTP=$(curl -sSL -o /tmp/github-existing.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}/tags/${TAG}")
          if [ "$HTTP" = "200" ]; then
            ID=$(jq -r .id /tmp/github-existing.json)
            echo "Updating existing GitHub release ${ID}"
            curl -fsSL -X PATCH \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d @/tmp/release-payload-github.json \
              "${API}/${ID}"
          else
            echo "Creating new GitHub release for ${TAG}"
            curl -fsSL -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d @/tmp/release-payload-github.json \
              "${API}"
          fi
