# secrets/keys as files under /run/secrets. Use this INSTEAD OF the bundle service above:
# there is no BUNDLE_PASSWORD and no bundle volume. Secrets can be Docker secrets or plain
# bind-mounted files; each must land at /run/secrets/<name>. STORAGE_PASSWORD must be >= 8
