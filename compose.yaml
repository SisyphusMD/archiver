services:

  archiver:

    container_name: archiver
    image: forgejo.bryantserver.com/sisyphusmd/archiver:0.8.12
    restart: unless-stopped
    stop_grace_period: 2m         # Allow time for graceful shutdown and cleanup

    hostname: backup-server       # used for backup service label (optional)

    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE              # Backup + restore: read/write data owned by other UIDs
      # CHOWN + FOWNER are ONLY needed to restore with original ownership. A backup-only
      # deployment can drop both; a restore without them logs a warning and lands files owned
      # by root (or run the restore with IGNORE_OWNERSHIP=1).
      - CHOWN                     # Restore: recreate files under their original owner
      - FOWNER                    # Restore: set mode/timestamps on files owned by other UIDs
    security_opt:
      - no-new-privileges:true

    environment:
      CRON_SCHEDULE: "0 3 * * *"  # Ex: daily at 3am, or omit for manual mode
      TZ: "America/New_York"      # Timezone for scheduled backups and timestamps (default: UTC)
      # SYSTEMCTL_FORCE_BUS: "1"  # Enable systemctl access to host (requires socket mounts)

    secrets:
      - bundle_password           # Bundle decryption password; mounted at /run/secrets/bundle_password

    volumes:
      - ./archiver-bundle:/opt/archiver/bundle       # Bundle file (required)
      - ./archiver-logs:/opt/archiver/logs           # Persistent logs (optional)
      - /path/to/host/backup-dir:/mnt/backup-dir     # Data to backup (must match config.sh)
      # - /var/run/docker.sock:/var/run/docker.sock                    # Docker socket for scripts (optional)
      # - /run/podman/podman.sock:/var/run/docker.sock               # Podman socket (mount as docker.sock)
      # - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket    # systemctl start/stop/status
      # - /etc/systemd/system:/etc/systemd/system                    # systemctl mask/unmask/enable/disable
      # - /path/to/host/restore-dir:/mnt/restore-dir                 # Restore location (will be prompted)

# Docker secret for the bundle service above. Each secret is one file mounted at
# /run/secrets/<name>; the bundle password is read from /run/secrets/bundle_password.
secrets:
  bundle_password:
    file: ./secrets/bundle_password   # a file containing ONLY the bundle password

# ---------------------------------------------------------------------------------------
# Env-native alternative (no bundle). Supply non-secret config as environment variables and
# secrets/keys as files under /run/secrets. Use this INSTEAD OF the bundle service above:
# there is no BUNDLE_PASSWORD and no bundle volume. Secrets can be Docker secrets or plain
# bind-mounted files; each must land at /run/secrets/<name>. STORAGE_PASSWORD must be >= 8
# chars. See the README "Configuration Sources" section.
