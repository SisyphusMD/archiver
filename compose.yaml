services:

  archiver:

    container_name: archiver
    image: forgejo.bryantserver.com/sisyphusmd/archiver:0.10.0
    restart: unless-stopped
    stop_grace_period: 2m         # Allow time for graceful shutdown and cleanup

    hostname: backup-server       # forms the Duplicacy snapshot ID (<hostname>-<service>); keep it stable

    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE              # Backup + restore: read/write data owned by other UIDs
      # CHOWN + FOWNER are ONLY needed to restore with original ownership. A backup-only
      # deployment can drop both; a restore without them logs a warning and lands files owned
      # by root (or run the restore with IGNORE_OWNERSHIP=1).
      - CHOWN                     # Restore: recreate files under their original owner
      - FOWNER                    # Restore: set mode/timestamps on files owned by other UIDs
    security_opt:
      - no-new-privileges:true

    environment:
      BACKUP_SCHEDULE: "0 3 * * *"        # backup pipeline: daily at 3am (omit for manual mode)
      MAINTENANCE_SCHEDULE: "0 13 * * *"  # check + prune: daily at 1pm, opposite the backup window
      TZ: "America/New_York"      # Timezone for scheduled backups and timestamps (default: UTC)
      # SYSTEMCTL_FORCE_BUS: "1"  # Enable systemctl access to host (requires socket mounts)

    # Non-secret settings, exactly as emitted by 'archiver init' or 'archiver migrate'.
    # The file holds no secrets, so it can be committed to git alongside this compose file.
    # (Values can also be inlined under environment: above — same effect.)
    env_file:
      - ./archiver.env

    secrets:                      # each secret is one file mounted at /run/secrets/<name>
      - storage_password          # >= 8 characters (Duplicacy requirement)
      - rsa_passphrase
      - rsa_private_key           # RSA keypair required in env-native mode
      - rsa_public_key
      - recovery_password         # automatic recovery kit on every storage target (README
                                  # "Automatic Recovery Kit"); 'init' generates it — keep a
                                  # copy in your password manager
      # - ssh_private_key         # only for sftp targets
      # - ssh_public_key          # only for sftp targets (restore needs both halves)
      # - storage_target_1_b2_id  # only for b2 targets
      # - storage_target_1_b2_key
      # - storage_target_1_s3_id  # only for s3 targets
      # - storage_target_1_s3_secret

    volumes:
      - ./archiver-logs:/opt/archiver/logs           # Persistent logs (optional)
      - /path/to/host/backup-dir:/mnt/backup-dir     # Data to backup (must match SERVICE_DIRECTORIES)
      - /path/to/host/backup/storage:/mnt/backup/storage   # Local storage target
      # This compose file itself, captured verbatim into the recovery kit so a recovered
      # deployment starts from your real manifest, not a reconstruction:
      - ./compose.yaml:/opt/archiver/deployment/compose.yaml:ro
      # - /var/run/docker.sock:/var/run/docker.sock                    # Docker socket for scripts (optional)
      # - /run/podman/podman.sock:/var/run/docker.sock               # Podman socket (mount as docker.sock)
      # - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket    # systemctl start/stop/status
      # - /etc/systemd/system:/etc/systemd/system                    # systemctl mask/unmask/enable/disable
      # - /path/to/host/restore-dir:/mnt/restore-dir                 # Restore location (will be prompted)

# Secrets for the env-native service above. Files can come straight from 'archiver init'
# (env-native/secrets/) or 'archiver migrate'; move them somewhere safe and reference them here.
secrets:
  storage_password: { file: ./secrets/storage_password }
  rsa_passphrase:   { file: ./secrets/rsa_passphrase }
  rsa_private_key:  { file: ./secrets/rsa_private_key }
  rsa_public_key:   { file: ./secrets/rsa_public_key }
  recovery_password: { file: ./secrets/recovery_password }
  # ssh_private_key: { file: ./secrets/ssh_private_key }             # only for sftp targets
  # ssh_public_key:  { file: ./secrets/ssh_public_key }              # only for sftp targets
  # storage_target_1_b2_id:     { file: ./secrets/storage_target_1_b2_id }
  # storage_target_1_b2_key:    { file: ./secrets/storage_target_1_b2_key }
  # storage_target_1_s3_id:     { file: ./secrets/storage_target_1_s3_id }
  # storage_target_1_s3_secret: { file: ./secrets/storage_target_1_s3_secret }

# ---------------------------------------------------------------------------------------
